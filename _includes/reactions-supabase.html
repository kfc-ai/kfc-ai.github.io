{% comment %}
  Supabase 좋아요/싫어요 리액션 위젯
  필요 설정: site.supabase_url, site.supabase_anon_key
{% endcomment %}

<style>
.sb-reactions{display:flex;align-items:center;gap:.75em;margin:2em 0 1.5em;padding:1em 0;border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0}
.sb-reactions__btn{display:inline-flex;align-items:center;gap:.4em;padding:.5em 1.1em;border:1px solid #e0e0e0;border-radius:20px;background:#fff;color:#6f777d;font-family:inherit;font-size:.85em;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}
.sb-reactions__btn:hover:not(:disabled){border-color:#999;color:#494e52}
.sb-reactions__btn:disabled{cursor:default}
.sb-reactions__btn--like.active{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.sb-reactions__btn--dislike.active{background:#fce4ec;border-color:#ef9a9a;color:#c62828}
.sb-reactions__btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.sb-reactions__count{font-weight:700;min-width:1ch}
</style>

<div class="sb-reactions" id="sb-reactions">
  <button class="sb-reactions__btn sb-reactions__btn--like" id="sb-like-btn" type="button">
    <svg viewBox="0 0 24 24"><path d="M2 20h2c.55 0 1-.45 1-1v-9c0-.55-.45-1-1-1H2v11zm19.83-7.12c.11-.25.17-.52.17-.8V11c0-1.1-.9-2-2-2h-5.5l.92-4.65c.05-.22.02-.46-.08-.66-.23-.45-.52-.86-.88-1.22L14 2 7.59 8.41C7.21 8.79 7 9.3 7 9.83v7.84C7 18.95 8.05 20 9.34 20h8.11c.7 0 1.36-.37 1.72-.97l2.66-6.15z"/></svg>
    <span>좋아요</span>
    <span class="sb-reactions__count" id="sb-like-count">-</span>
  </button>
  <button class="sb-reactions__btn sb-reactions__btn--dislike" id="sb-dislike-btn" type="button">
    <svg viewBox="0 0 24 24"><path d="M22 4h-2c-.55 0-1 .45-1 1v9c0 .55.45 1 1 1h2V4zM2.17 11.12c-.11.25-.17.52-.17.8V13c0 1.1.9 2 2 2h5.5l-.92 4.65c-.05.22-.02.46.08.66.23.45.52.86.88 1.22L10 22l6.41-6.41c.38-.38.59-.89.59-1.42V6.34C17 5.05 15.95 4 14.66 4h-8.11c-.7 0-1.36.37-1.72.97l-2.66 6.15z"/></svg>
    <span>싫어요</span>
    <span class="sb-reactions__count" id="sb-dislike-count">-</span>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function() {
  var SUPABASE_URL = '{{ site.supabase_url }}';
  var SUPABASE_KEY = '{{ site.supabase_anon_key }}';
  var PAGE_SLUG = '{{ page.url }}';
  var STORAGE_KEY = 'sb_reaction_' + PAGE_SLUG;

  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var likeBtn = document.getElementById('sb-like-btn');
  var dislikeBtn = document.getElementById('sb-dislike-btn');
  var likeCountEl = document.getElementById('sb-like-count');
  var dislikeCountEl = document.getElementById('sb-dislike-count');

  /* ── voter fingerprint ── */
  function getVoterHash() {
    var stored = localStorage.getItem('sb_voter_hash');
    if (stored) return stored;
    var raw = [
      navigator.userAgent,
      screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
      Intl.DateTimeFormat().resolvedOptions().timeZone,
      navigator.language,
      navigator.hardwareConcurrency || '',
      navigator.platform || ''
    ].join('|');
    var h = 5381;
    for (var i = 0; i < raw.length; i++) {
      h = ((h << 5) + h) + raw.charCodeAt(i);
      h |= 0;
    }
    var hash = 'fp_' + Math.abs(h).toString(36);
    localStorage.setItem('sb_voter_hash', hash);
    return hash;
  }

  /* ── UI helpers ── */
  function setVotedState(type) {
    likeBtn.disabled = true;
    dislikeBtn.disabled = true;
    if (type === 'like') likeBtn.classList.add('active');
    else dislikeBtn.classList.add('active');
  }

  /* ── load counts + check existing vote ── */
  function init() {
    var voterHash = getVoterHash();
    var localVote = localStorage.getItem(STORAGE_KEY);

    // 카운트 로드
    sb.from('reactions')
      .select('type')
      .eq('page_slug', PAGE_SLUG)
      .then(function(res) {
        if (res.error || !res.data) return;
        var likes = 0, dislikes = 0;
        res.data.forEach(function(r) {
          if (r.type === 'like') likes++;
          else if (r.type === 'dislike') dislikes++;
        });
        likeCountEl.textContent = likes;
        dislikeCountEl.textContent = dislikes;
      });

    // 투표 상태 확인
    if (localVote) {
      setVotedState(localVote);
    } else {
      sb.from('reactions')
        .select('type')
        .eq('page_slug', PAGE_SLUG)
        .eq('voter_hash', voterHash)
        .maybeSingle()
        .then(function(res) {
          if (res.data) {
            localStorage.setItem(STORAGE_KEY, res.data.type);
            setVotedState(res.data.type);
          }
        });
    }
  }

  /* ── vote handler ── */
  function vote(type) {
    if (localStorage.getItem(STORAGE_KEY)) return;

    var voterHash = getVoterHash();
    likeBtn.disabled = true;
    dislikeBtn.disabled = true;

    sb.from('reactions')
      .insert({ page_slug: PAGE_SLUG, type: type, voter_hash: voterHash })
      .then(function(res) {
        if (res.error) {
          // 중복 투표 (UNIQUE 위반)
          if (res.error.code === '23505') {
            sb.from('reactions')
              .select('type')
              .eq('page_slug', PAGE_SLUG)
              .eq('voter_hash', voterHash)
              .maybeSingle()
              .then(function(r) {
                var t = (r.data && r.data.type) || type;
                localStorage.setItem(STORAGE_KEY, t);
                setVotedState(t);
              });
          } else {
            likeBtn.disabled = false;
            dislikeBtn.disabled = false;
          }
          return;
        }
        localStorage.setItem(STORAGE_KEY, type);
        setVotedState(type);
        var el = type === 'like' ? likeCountEl : dislikeCountEl;
        el.textContent = parseInt(el.textContent || '0') + 1;
      });
  }

  likeBtn.addEventListener('click', function() { vote('like'); });
  dislikeBtn.addEventListener('click', function() { vote('dislike'); });

  init();
})();
</script>
